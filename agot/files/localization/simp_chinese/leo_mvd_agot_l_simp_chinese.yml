l_simp_chinese:
 # Exempt (grayed) display keys for AGOT's settle_wilderness directive; the
 # colored display uses AGOT's own settle_wilderness_icon / settlement_focus_text.
 leo_mvd_x_settle_wilderness_icon: "@leo_mvd_gray_settle_wilderness!"
 leo_mvd_x_settle_wilderness_text: "[directive|E]：定居荒野省份$leo_mvd_exempt_suffix$"

 # AGOT-only presets (6, 7). Style follows the base presets: directive names are
 # $leo_mvd_ui_dir_N$ refs (so they track any rename and carry the inline icon).
 # Unlike the base presets these use no administrative directives (the Seven
 # Kingdoms are feudal), so nothing changes with Roads to Power and the _tt and
 # _tt_nodlc variants are identical.
 leo_mvd_ui_preset_6: "七大王国之主"
 leo_mvd_ui_preset_6_tt: "治理一个多元的王国，让各[vassal|E]各安其位。\n\n与你同[faith|E]的[vassals|E]$leo_mvd_ui_dir_1$；他[faith|E]者则不予干预。\n铁民$leo_mvd_ui_dir_8$。\n七大王国境内的[vassals|E]$leo_mvd_ui_dir_9$；边疆上的则$leo_mvd_ui_dir_7$。"
 leo_mvd_ui_preset_6_tt_nodlc: "治理一个多元的王国，让各[vassal|E]各安其位。\n\n与你同[faith|E]的[vassals|E]$leo_mvd_ui_dir_1$；他[faith|E]者则不予干预。\n铁民$leo_mvd_ui_dir_8$。\n七大王国境内的[vassals|E]$leo_mvd_ui_dir_9$；边疆上的则$leo_mvd_ui_dir_7$。"
 leo_mvd_ui_preset_7: "开拓边疆"
 leo_mvd_ui_preset_7_tt: "壮大已定居的王国，并将疆界向外拓展。\n\n与你同[faith|E]的[vassals|E]$leo_mvd_ui_dir_1$。\n七大王国境内的[vassals|E]$leo_mvd_ui_dir_9$；边疆上的则$leo_mvd_ui_dir_14$。"
 leo_mvd_ui_preset_7_tt_nodlc: "壮大已定居的王国，并将疆界向外拓展。\n\n与你同[faith|E]的[vassals|E]$leo_mvd_ui_dir_1$。\n七大王国境内的[vassals|E]$leo_mvd_ui_dir_9$；边疆上的则$leo_mvd_ui_dir_14$。"
 leo_mvd_ui_cond_15: "是铁民"
 leo_mvd_ui_cond_16: "信奉七神信仰"
 leo_mvd_ui_cond_17: "信奉旧神"
