l_english:
 ### Configuration panel
 leo_mvd_panel_title: "Vassal Directive Automation"
 leo_mvd_ui_heading_automation: "Automation"
 leo_mvd_ui_auto: "Automatically Reassign Vassal Directives"
 leo_mvd_ui_auto_tt: "When enabled, the [directive|E] priority waterfall re-runs across all eligible [vassals|E] every month and again whenever you change a setting here. Turning it on applies directives immediately.\n\n#weak Manual assignments on non-exempt vassals are overwritten by each run. Exempt a vassal through their interaction menu to protect your choice.#!"
 leo_mvd_ui_prioritize: "Prioritize Faith and Culture Conversion"
 leo_mvd_ui_prioritize_tt: "When enabled, vassals who share your [faith|E] and hold counties of another faith are told to Convert Faith first, then same-[culture|E] vassals to Promote Culture, then the fallback applies.\n\nWhen off, the initial faith and culture conversion priorities are skipped and every eligible vassal goes straight to your configured fallback."
 leo_mvd_ui_apply: "Apply Now"
 leo_mvd_ui_apply_tt: "Apply the configured [directive|E] priority across all eligible, non-exempt [vassals|E] now."
 leo_mvd_ui_remove_all: "Remove All"
 leo_mvd_ui_remove_all_tt: "Remove every [directive|E] this automation assigned, clear all exemptions, and turn automation off. Directives you assigned manually are kept."
 leo_mvd_ui_heading_fallback: "Fallback"
 leo_mvd_ui_fallback_tt: "What to assign a vassal when neither conversion priority applies (or when conversion is not prioritized).\n\n#weak None:#! leave them without a [directive|E].\n#weak Single Directive for All:#! give every remaining vassal the [directive|E] of your choice.\n#weak By Military Strength:#! weaker vassals build [military_buildings|E], stronger ones improve [development|E] (or build [economic_buildings|E] where development does not apply)."
 leo_mvd_ui_p3_none: "None"
 leo_mvd_ui_p3_blanket: "Single Directive for All"
 leo_mvd_ui_p3_branch: "By Military Strength"
 # Blanket directive choices (shown when the fallback mode is Single Directive for All).
 # The $directive$ keys already include the directive's icon.
 leo_mvd_ui_blanket_heading: "Directive"
 leo_mvd_ui_threshold_heading: "Military Strength Baseline"
 leo_mvd_ui_blanket_3: "$improve_development$"
 leo_mvd_ui_blanket_4: "$train_commanders$"
 leo_mvd_ui_blanket_5: "$build_maa$"
 leo_mvd_ui_blanket_6: "$improve_cultural_acceptance$"
 leo_mvd_ui_blanket_7: "$building_focus_fortification$"
 leo_mvd_ui_blanket_8: "$building_focus_military$"
 leo_mvd_ui_blanket_9: "$building_focus_economy$"
 # Strength thresholds (shown when the fallback mode is By Military Strength)
 leo_mvd_ui_threshold_tt: "The value is the #V duchy#! baseline. It scales by [title|E] tier so it stays meaningful at every realm size: counts x0.5, dukes x1, kings x3, emperors x6.\n\nVassals below their scaled threshold build [military_buildings|E]; those at or above improve [development|E] (or build [economic_buildings|E] where development does not apply)."
 leo_mvd_ui_threshold_500: "500"
 leo_mvd_ui_threshold_1000: "1000"
 leo_mvd_ui_threshold_2000: "2000"
 leo_mvd_ui_threshold_5000: "5000"

 ### Interactions
 leo_mvd_exempt_interaction: "Exempt from Directive Automation"
 leo_mvd_exempt_interaction_desc: "Exclude [recipient.GetFullName] from your automated [directive|E] assignments so you can manage [recipient.GetHerHim] manually."
 leo_mvd_exempt_tt: "[recipient.GetFullName] will be skipped by directive automation and their directive icon shown dimmed. Assign [recipient.GetHerHis] [directive|E] manually with #V Give Vassal Directive#!."
 leo_mvd_unexempt_interaction: "Include in Directive Automation"
 leo_mvd_unexempt_interaction_desc: "Let the automated [directive|E] waterfall manage [recipient.GetFullName] again."
 leo_mvd_unexempt_tt: "[recipient.GetFullName] will be managed by directive automation again on the next run."

 ### Exemption marker (customizable localization override keys)
 # Exempt vassals show a dimmed (grey-tinted) version of their directive icon
 # instead of the normal one. The icon keys below point at the grey texticon
 # twins defined in gui/leo_mvd_texticons.gui.
 leo_mvd_exempt_suffix: "\n#weak Exempt from directive automation#!"
 # icon variants
 leo_mvd_x_no_directive_icon: "@leo_mvd_grey_directive_none!"
 leo_mvd_x_directive_refusal_icon: "@leo_mvd_grey_directive_refusal!"
 leo_mvd_x_improve_development_icon: "@leo_mvd_grey_task_develop_county!"
 leo_mvd_x_train_commanders_icon: "@leo_mvd_grey_task_train_commanders!"
 leo_mvd_x_build_maa_icon: "@leo_mvd_grey_directive_maa!"
 leo_mvd_x_convert_faith_icon: "@leo_mvd_grey_task_conversion!"
 leo_mvd_x_convert_culture_icon: "@leo_mvd_grey_task_promote_culture!"
 leo_mvd_x_improve_cultural_acceptance_icon: "@leo_mvd_grey_task_accept_culture!"
 leo_mvd_x_building_focus_fortification_icon: "@leo_mvd_grey_directive_fortification!"
 leo_mvd_x_building_focus_military_icon: "@leo_mvd_grey_directive_military!"
 leo_mvd_x_building_focus_economy_icon: "@leo_mvd_grey_directive_economical!"
 leo_mvd_x_manage_fertility_icon: "@leo_mvd_grey_county_fertility_icon!"
 leo_mvd_x_explore_cultures_icon: "@leo_mvd_grey_explore_cultures_icon!"
 leo_mvd_x_raid_innovation_intent_icon: "@leo_mvd_grey_culture_icon!"
 leo_mvd_x_raid_herd_intent_icon: "@leo_mvd_grey_herd_icon!"
 # text variants
 leo_mvd_x_no_directive_text: "$no_directive_text$$leo_mvd_exempt_suffix$"
 leo_mvd_x_refusing_directive_text: "$refusing_directive_text$$leo_mvd_exempt_suffix$"
 leo_mvd_x_improve_development_text: "$improve_development_text$$leo_mvd_exempt_suffix$"
 leo_mvd_x_train_commanders_text: "$train_commanders_text$$leo_mvd_exempt_suffix$"
 leo_mvd_x_build_maa_text: "$build_maa_text$$leo_mvd_exempt_suffix$"
 leo_mvd_x_convert_faith_text: "$convert_faith_text$$leo_mvd_exempt_suffix$"
 leo_mvd_x_convert_culture_text: "$convert_culture_text$$leo_mvd_exempt_suffix$"
 leo_mvd_x_improve_cultural_acceptance_text: "$improve_cultural_acceptance_text$$leo_mvd_exempt_suffix$"
 leo_mvd_x_building_focus_fortification_text: "$building_focus_fortification_text$$leo_mvd_exempt_suffix$"
 leo_mvd_x_building_focus_military_text: "$building_focus_military_text$$leo_mvd_exempt_suffix$"
 leo_mvd_x_building_focus_economy_text: "$building_focus_economy_text$$leo_mvd_exempt_suffix$"
 leo_mvd_x_county_fertility_text: "$county_fertility_text$$leo_mvd_exempt_suffix$"
 leo_mvd_x_explore_cultures_text: "$explore_cultures_text$$leo_mvd_exempt_suffix$"
 leo_mvd_x_culture_text: "$culture_text$$leo_mvd_exempt_suffix$"
 leo_mvd_x_herd_text: "$herd_text$$leo_mvd_exempt_suffix$"
 # No text-and-icon override: an exempt vassal's text-and-icon display is left
 # as vanilla (the grey icon comes from the icon variant, and the exempt note
 # from the text variant), so the override file keeps vanilla's text_and_icon
 # block unchanged and no leo_mvd_x_* text-and-icon keys are needed.
