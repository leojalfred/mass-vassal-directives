l_english:
 ### Configuration panel
 leo_mvd_panel_title: "Mass Vassal Directives"
 leo_mvd_ui_heading_preset: "Preset"
 leo_mvd_ui_heading_description: "Description"
 # Heads the waterfall itself. "Priorities" rather than "Configuration" because
 # it names what is under it - the sections below are Priority 1, 2, 3 - and the
 # whole panel is configuration.
 leo_mvd_ui_heading_priorities: "Priorities"
 # Nomads keep their own running order: they have four directives no one else
 # can be given, and can be given none of the other nine.
 leo_mvd_ui_heading_nomads: "Nomad Priorities"
 leo_mvd_ui_nomads_empty_tt: "Your [nomad|E] [vassals|E] are left alone.\n\nThey answer to a running order of their own, because the [directives|E] they can be given are theirs alone - no [nomad|E] raises [fortification_buildings|E], and no one else keeps a [herd|E].\n\n#weak Add a priority to put them to work.#!"
 leo_mvd_ui_auto: "Automatically Reassign Vassal Directives"
 leo_mvd_ui_auto_tt: "When enabled, the [directive|E] priority waterfall re-runs across all eligible [vassals|E] every month and again whenever you change a setting here. Turning it on applies directives immediately.\n\n#weak Manual assignments on non-exempt vassals are overwritten by each run. Exempt a vassal through their interaction menu to protect your choice.#!"
 leo_mvd_ui_apply: "Apply Now"
 leo_mvd_ui_apply_tt: "Apply the configured [directive|E] priority across all eligible, non-exempt [vassals|E] now."
 leo_mvd_ui_remove_all: "Remove All"
 leo_mvd_ui_remove_all_tt: "Remove every [directive|E] this automation assigned, clear all exemptions, and turn automation off. Directives you assigned manually are kept."
 ### Presets
 # A preset is a rule set: an ordered list of priorities, where each vassal gets
 # the first one that applies to them. The $leo_mvd_ui_dir_N$ keys are the
 # directive names, with an inline-sized icon; they are generated into
 # leo_mvd_ui_l_english.yml. Do not use vanilla's $convert_faith$ and friends
 # here - their icons are sized for a row of their own and break running text.
 leo_mvd_ui_preset_0: "None"
 # Doubles as the panel's Description text while None is selected, so it has to
 # both say what None does and point a new player somewhere useful.
 leo_mvd_ui_preset_0_tt: "Nothing is assigned, and the automation gives up any [directives|E] it handed out. [directives|E] you gave a [vassal|E] yourself are left alone.\n\nA preset is a running order: each [vassal|E] is given the first [directive|E] in it that suits them. Pick one above and its plan appears here.\n\nOr choose #V Custom#! to write the order yourself, priority by priority. Hand every [vassal|E] the same [directive|E], or judge them on what you choose, from [faith|E] and [culture|E] to strength, [development|E], and standing, and give each the [directive|E] that fits.\n\n#weak Nothing happens until you choose.#!"
 leo_mvd_ui_preset_1: "Convert and Develop"
 leo_mvd_ui_preset_1_tt: "Bring your [vassals|E] into the fold, then grow them.\n\n#weak 1.#! Vassals of your [faith|E] holding counties of another are told to $leo_mvd_ui_dir_1$.\n#weak 2.#! Vassals of your [culture|E] holding counties of another are told to $leo_mvd_ui_dir_2$.\n#weak 3.#! Of the rest, the militarily strong $leo_mvd_ui_dir_3$ and the weak $leo_mvd_ui_dir_8$.\n#weak 4.#! All left over vassals $leo_mvd_ui_dir_9$."
 leo_mvd_ui_preset_2: "Unify the Realm"
 leo_mvd_ui_preset_2_tt: "Make the realm one people.\n\n#weak 1.#! Vassals of your [faith|E] holding counties of another are told to $leo_mvd_ui_dir_1$.\n#weak 2.#! Vassals of your [culture|E] holding counties of another are told to $leo_mvd_ui_dir_2$.\n#weak 3.#! Those still holding foreign-[culture|E] counties work on $leo_mvd_ui_dir_6$.\n#weak 4.#! All left over vassals $leo_mvd_ui_dir_9$.\n\n#weak Converts harder than Convert and Develop, at the cost of growth.#!"
 leo_mvd_ui_preset_3: "Prepare for War"
 leo_mvd_ui_preset_3_tt: "Arm the realm, each [vassal|E] to their strength.\n\nStrong vassals contribute what their government does best: administrative ones $leo_mvd_ui_dir_5$, the rest $leo_mvd_ui_dir_7$.\nWeak vassals everywhere are told to $leo_mvd_ui_dir_8$ first.\n\n#weak Ignores [faith|E] and [culture|E] entirely.#!"
 leo_mvd_ui_preset_4: "Grow the Economy"
 leo_mvd_ui_preset_4_tt: "Build wealth before anything else.\n\nUndeveloped vassals are told to $leo_mvd_ui_dir_3$.\nEstablished vassals turn to $leo_mvd_ui_dir_9$.\n\n#weak Ignores [faith|E] and [culture|E] entirely.#!"
 leo_mvd_ui_preset_5: "Custom"
 leo_mvd_ui_preset_5_tt: "Your own rules, written below.\n\n#weak Choosing Custom here starts from nothing. To start from a preset instead, simply change one of its rules - the preset becomes yours, as it was, with your change.#!"

 # Without Roads to Power the administrative directives drop out, so the three
 # built-ins that used them run a different flow (see the presets in
 # leo_mvd_rules.txt). The panel shows these instead when that DLC is absent;
 # the presets whose flow does not change alias back to their base description.
 leo_mvd_ui_preset_0_tt_nodlc: "$leo_mvd_ui_preset_0_tt$"
 leo_mvd_ui_preset_1_tt_nodlc: "Bring your [vassals|E] into the fold, then grow them.\n\n#weak 1.#! Vassals of your [faith|E] holding counties of another are told to $leo_mvd_ui_dir_1$.\n#weak 2.#! Vassals of your [culture|E] holding counties of another are told to $leo_mvd_ui_dir_2$.\n#weak 3.#! Of the rest, the militarily strong $leo_mvd_ui_dir_9$ and the weak $leo_mvd_ui_dir_8$."
 leo_mvd_ui_preset_2_tt_nodlc: "$leo_mvd_ui_preset_2_tt$"
 leo_mvd_ui_preset_3_tt_nodlc: "Arm the realm, each [vassal|E] to their strength.\n\nStrong vassals $leo_mvd_ui_dir_7$, while the weak are told to $leo_mvd_ui_dir_8$.\n\n#weak Ignores [faith|E] and [culture|E] entirely.#!"
 leo_mvd_ui_preset_4_tt_nodlc: "Build wealth before anything else.\n\nAll vassals are told to $leo_mvd_ui_dir_9$.\n\n#weak Ignores [faith|E] and [culture|E] entirely.#!"
 leo_mvd_ui_preset_5_tt_nodlc: "$leo_mvd_ui_preset_5_tt$"

 ### Conditions
 # Most conditions are self-explanatory from their label; Military Strength is
 # not, because its number is a duchy-tier yardstick scaled by the vassal's rank
 # (see leo_mvd_values.txt). This tooltip is attached to that option only.
 leo_mvd_ui_cond_9_tt: "The figure is a [duchy|E]-tier yardstick, scaled to each [vassal|E]'s rank so a single setting stays meaningful across the realm. Larger realms raise larger armies.\n\nAgainst the figure a [county|E]-tier vassal is asked 0.4x, a [duchy|E]-tier one 1x, a [kingdom|E]-tier one 3x, an [empire|E]-tier one 8x.\n\n#weak So a choice of 1000 comes out to 400 troops for a count, 1000 for a duke, 3000 for a king, and 8000 for an emperor.#!"

 ### Interactions
 leo_mvd_exempt_interaction: "Exempt from Directive Automation"
 leo_mvd_exempt_interaction_desc: "Exclude [recipient.GetFullName] from your automated [directive|E] assignments so you can manage [recipient.GetHerHim] manually."
 leo_mvd_exempt_tt: "[recipient.GetFullName] will be skipped by directive automation and their directive icon shown dimmed. Assign [recipient.GetHerHis] [directive|E] manually with #V Give Vassal Directive#!."
 leo_mvd_unexempt_interaction: "Include in Directive Automation"
 leo_mvd_unexempt_interaction_desc: "Let the automated [directive|E] waterfall manage [recipient.GetFullName] again."
 leo_mvd_unexempt_tt: "[recipient.GetFullName] will be managed by directive automation again on the next run."

 ### Exemption marker (customizable localization override keys)
